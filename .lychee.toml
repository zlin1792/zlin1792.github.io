accept = [200, 204, 206, 301, 302, 403, 429]
include_mail = false
max_retries = 2
timeout = 20

# Google Scholar often blocks automated requests, so the link is checked by
# presence in the site spec rather than by live HTTP status. A small number of
# legitimate external pages are also excluded because they intermittently time
# out in GitHub Actions.
exclude = [
  "https://scholar.google.com/.*",
  "https://www.grad.ubc.ca/campus-community/meet-our-students/lin-zhen",
  "https://doi.org/10.53956/jfde.2021.148"
]
